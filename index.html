<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SourcerLens — Search smarter. Understand deeper.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;
  --surface:#1a1a1a;
  --surface2:#222;
  --border:#2e2e2e;
  --border2:#3a3a3a;
  --amber:#f59e0b;
  --amber-dim:#b97d0e;
  --text:#e8e6e0;
  --text-secondary:#999;
  --text-tertiary:#555;
  --green:#6ee7b7;
  --blue:#93c5fd;
  --purple:#a5b4fc;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

/* ── Layout ── */
.app{max-width:820px;margin:0 auto;padding:2.5rem 1.5rem 5rem;}

/* ── Header ── */
.header{margin-bottom:2.5rem;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:0.4rem;}
.logo-mark{width:28px;height:28px;background:var(--amber);border-radius:7px;display:grid;place-items:center;flex-shrink:0;}
.logo-name{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-0.01em;}
.logo-name span{color:var(--amber);}
.tagline{font-size:12px;color:var(--text-tertiary);letter-spacing:0.06em;text-transform:uppercase;}

/* ── Search ── */
.search-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:0.5rem;}
.search-wrap{position:relative;margin-bottom:2rem;}
.search-input{width:100%;background:var(--surface);border:1.5px solid var(--border2);border-radius:11px;padding:14px 48px 14px 16px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--amber);}
.search-input::placeholder{color:var(--text-tertiary);}
.search-icon{position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);pointer-events:none;}

/* ── Suggestions ── */
.suggestions{display:none;position:absolute;top:calc(100% + 7px);left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-radius:11px;overflow:hidden;z-index:50;box-shadow:0 12px 40px rgba(0,0,0,0.6);}
.sug-item{padding:11px 16px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background 0.1s;border-bottom:1px solid var(--border);}
.sug-item:last-child{border-bottom:none;}
.sug-item:hover,.sug-item.active{background:var(--surface);}
.sug-item .hi{color:var(--amber);font-weight:500;}
.sug-via{font-size:11px;color:#444;margin-left:6px;}
.sug-ind{font-size:11px;color:var(--text-tertiary);flex-shrink:0;margin-left:12px;}

/* ── Empty state ── */
.empty{text-align:center;padding:4rem 0 2rem;}
.empty-ico{font-size:30px;margin-bottom:1rem;opacity:0.3;}
.empty-txt{font-size:14px;font-weight:300;line-height:1.7;color:var(--text-tertiary);}

/* ── Result ── */
.result-wrap{animation:fadeUp 0.3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.role-header{margin-bottom:1.25rem;}
.role-title{font-family:'DM Serif Display',serif;font-size:28px;letter-spacing:-0.02em;margin-bottom:4px;}
.role-ind{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#0f0f0f;background:var(--amber);padding:3px 10px;border-radius:999px;}

.divider{height:1px;background:var(--border);margin:1.25rem 0;}

.sec-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:0.65rem;}

.overview{font-size:14px;line-height:1.85;color:#a8a49e;font-weight:300;margin-bottom:1.75rem;}

/* ── Keyword pills ── */
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.75rem;}
.pill{font-size:12px;padding:5px 13px;background:#1e1e1e;border:1px solid var(--border2);border-radius:999px;color:var(--text);cursor:default;transition:border-color 0.15s,color 0.15s;}
.pill:hover{border-color:var(--amber-dim);color:var(--amber);}

/* ── Filter box ── */
.filter-box{background:var(--surface);border:1px solid var(--border2);border-radius:11px;padding:1rem 1.25rem;margin-bottom:1.75rem;}
.filter-opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:0.75rem;}
.fbtn{font-size:13px;font-family:'DM Sans',sans-serif;font-weight:400;padding:5px 17px;background:#242424;border:1px solid #484848;border-radius:999px;color:#d0cdc8;cursor:pointer;transition:all 0.15s;line-height:1.5;}
.fbtn:hover{border-color:var(--amber-dim);color:var(--text);background:#2c2c2c;}
.fbtn.on{background:var(--amber);border-color:var(--amber);color:#0f0f0f;font-weight:500;}

/* ── Boolean box ── */
.bool-box{background:var(--surface);border:1px solid var(--border2);border-radius:11px;overflow:hidden;}
.bool-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);background:#1c1c1c;}
.bool-head-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#666;}
.copy-btn{font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;padding:5px 16px;background:var(--amber);border:none;border-radius:999px;color:#0f0f0f;cursor:pointer;transition:opacity 0.15s;line-height:1.4;}
.copy-btn:hover{opacity:0.85;}
.bool-body{padding:1.1rem 1.25rem;font-family:'DM Mono',monospace;font-size:12px;line-height:2.1;word-break:break-word;color:#666;}
.bool-body .t{color:var(--amber);}
.bool-body .k{color:var(--green);}
.bool-body .k2{color:var(--blue);}
.bool-body .op{color:var(--purple);font-weight:500;}

/* ── Legend ── */
.legend{display:flex;flex-wrap:wrap;gap:14px;padding:0.75rem 1.25rem;border-top:1px solid var(--border);background:#161616;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-tertiary);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── Footer ── */
.footer{margin-top:3rem;text-align:center;font-size:11px;color:#333;letter-spacing:0.04em;}
.footer a{color:#555;text-decoration:none;}
.footer a:hover{color:var(--amber);}
</style>
</head>
<body>

</div>

/* ── State ── */
let filtered=[], activeIdx=-1, curRole=null, curFilter=null;

/* ── Synonym map ── */
function buildMap(){
  const m={};
  DATA.forEach(d=>{
    m[d.role.toLowerCase()]=d;
    d.synonyms.forEach(s=>{m[s.toLowerCase()]=d;});
  });
  return m;
}
const MAP=buildMap();

/* ── Search ── */
function onInput(v){
  activeIdx=-1;
  const q=v.trim().toLowerCase();
  const el=document.getElementById('sug');
  if(!q){el.style.display='none';filtered=[];return;}
  const seen=new Set();
  filtered=[];
  DATA.forEach(d=>{
    [d.role,...d.synonyms].forEach(t=>{
      if(t.toLowerCase().includes(q)&&!seen.has(d.role)){
        seen.add(d.role);
        filtered.push({d,matched:t});
      }
    });
  });
  if(!filtered.length){el.style.display='none';return;}
  el.innerHTML=filtered.slice(0,7).map((f,i)=>{
    const hl=f.matched.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<span class="hi">$1</span>');
    const via=f.matched.toLowerCase()!==f.d.role.toLowerCase()
      ?`<span class="sug-via">→ ${f.d.role}</span>`:'';
    return `<div class="sug-item" onmousedown="pick(${i})"><span>${hl}${via}</span><span class="sug-ind">${f.d.industry}</span></div>`;
  }).join('');
  el.style.display='block';
}

function onKey(e){
  const items=document.querySelectorAll('.sug-item');
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);hlItems(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);hlItems(items);}
  else if(e.key==='Enter'&&activeIdx>=0)pick(activeIdx);
  else if(e.key==='Escape')document.getElementById('sug').style.display='none';
}
function hlItems(items){items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));}

function pick(i){
  if(!filtered[i])return;
  curRole=filtered[i].d;
  curFilter=null;
  document.getElementById('si').value=curRole.role;
  document.getElementById('sug').style.display='none';
  render();
}

/* ── Filter ── */
function toggleFilter(name){
  curFilter=curFilter===name?null:name;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',b.dataset.n===curFilter));
  refreshBool();
}

/* ── Boolean builder ── */
function buildBool(){
  const r=curRole;
  let titles,core_kws,lang_kws=null;
  if(curFilter&&r.filter){
    const opt=r.filter.options.find(o=>o.name===curFilter);
    if(opt){
      titles=opt.titles.map(t=>`"${t}"`).join(' OR ');
      core_kws=r.base_kws.map(k=>k.includes(' ')?`"${k}"`:k).join(' OR ');
      lang_kws=opt.kws.map(k=>k.includes(' ')?`"${k}"`:k).join(' OR ');
    }
  }
  if(!lang_kws){
    titles=r.base_titles.map(t=>`"${t}"`).join(' OR ');
    core_kws=r.base_kws.map(k=>k.includes(' ')?`"${k}"`:k).join(' OR ');
  }
  return{titles,core_kws,lang_kws};
}

function refreshBool(){
  const body=document.getElementById('boolBody');
  if(!body)return;
  const{titles,core_kws,lang_kws}=buildBool();
  let full,html;
  if(lang_kws){
    full=`(${titles}) AND (${core_kws}) AND (${lang_kws})`;
    html=
      `<span class="op">(</span><span class="t">${titles}</span><span class="op">)</span><br>`+
      `<span class="op">AND&nbsp;(</span><span class="k">${core_kws}</span><span class="op">)</span><br>`+
      `<span class="op">AND&nbsp;(</span><span class="k2">${lang_kws}</span><span class="op">)</span>`;
  }else{
    full=`(${titles}) AND (${core_kws})`;
    html=
      `<span class="op">(</span><span class="t">${titles}</span><span class="op">)</span><br>`+
      `<span class="op">AND&nbsp;(</span><span class="k">${core_kws}</span><span class="op">)</span>`;
  }
  body.dataset.full=full;
  body.innerHTML=html;
}

/* ── Render result ── */
function render(){
  const r=curRole;
  const filterHtml=r.filter?`
    <div class="filter-box">
      <div class="sec-label">${r.filter.label}</div>
      <div class="filter-opts">
        ${r.filter.options.map(o=>`<button class="fbtn" data-n="${o.name}" onclick="toggleFilter('${o.name}')">${o.name}</button>`).join('')}
      </div>
    </div>`:'';

  const legendHtml=`
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Title variations</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Persona keywords</div>
      ${r.filter?`<div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Filter-specific keywords</div>`:''}
    </div>`;

  document.getElementById('result').innerHTML=`
    <div class="result-wrap">
      <div class="role-header">
        <div class="role-title">${r.role}</div>
        <div style="margin-top:6px;"><span class="role-ind">${r.industry}</span></div>
      </div>
      <div class="divider"></div>
      <div class="sec-label">Role Overview</div>
      <div class="overview">${r.overview}</div>
      <div class="sec-label">Persona Keywords</div>
      <div class="pills">${r.keywords.map(k=>`<span class="pill">${k}</span>`).join('')}</div>
      ${filterHtml}
      <div class="bool-box">
        <div class="bool-head">
          <div class="bool-head-label">Boolean String</div>
          <button class="copy-btn" onclick="copyBool()">Copy</button>
        </div>
        <div class="bool-body" id="boolBody"></div>
        ${legendHtml}
      </div>
    </div>`;
  refreshBool();
}

/* ── Copy ── */
function copyBool(){
  const full=document.getElementById('boolBody')?.dataset.full||'';
  navigator.clipboard.writeText(full).then(()=>{
    const btn=document.querySelector('.copy-btn');
    if(!btn)return;
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy',2000);
  });
}

/* ── Close suggestions on outside click ── */
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap'))
    document.getElementById('sug').style.display='none';
});
</script>
</body>
</html>
